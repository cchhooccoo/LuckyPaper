name: 更新彩票开奖数据

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 抓取最新开奖数据
        run: python scripts/fetch_lottery_data.py
        continue-on-error: true

      - name: 提交更新（如果数据有变化）
        run: |
          git config user.name "lottery-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data
          if git diff --cached --quiet; then
            echo "数据没有变化，跳过提交"
          else
            git commit -m "chore: 更新开奖数据 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
