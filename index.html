<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Noto+Sans+SC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF1DF;
    --card:#FFFFFF;
    --card-soft:#FFF8EC;
    --red:#EB6F59;
    --red-dark:#D6543C;
    --gold:#F2B23E;
    --gold-dark:#DC9A20;
    --ink:#2E2620;
    --ink-soft:#8C7C68;
    --line:rgba(46,38,32,0.08);
    --shadow:rgba(46,38,32,0.12);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% -10%, rgba(242,178,62,0.16), transparent 45%),
      radial-gradient(circle at 100% 10%, rgba(235,111,89,0.12), transparent 40%),
      var(--bg);
    font-family:'Noto Sans SC', sans-serif;
    font-size:15.5px;
    color:var(--ink);
    padding:20px 14px 60px;
    display:flex;
    justify-content:center;
  }
  .app{ width:100%; max-width:640px; }

  header.top{
    display:flex; align-items:center; gap:14px;
    padding:6px 4px 22px;
  }
  header.top img{
    width:56px; height:56px; border-radius:16px;
    box-shadow:0 6px 16px var(--shadow);
    flex-shrink:0;
  }
  header.top .word{ display:flex; flex-direction:column; }
  header.top .word .brand{
    font-family:'Baloo 2', 'Noto Sans SC', sans-serif;
    font-weight:800; font-size:26px;
    color:var(--red-dark);
    line-height:1.1;
  }
  header.top .word .sub{
    font-size:13.5px; color:var(--ink-soft); margin-top:3px;
  }

  .card{
    background:var(--card);
    border-radius:20px;
    padding:20px 20px;
    margin-bottom:14px;
    box-shadow:0 4px 18px var(--shadow);
  }
  .card h2{
    font-size:18.5px; font-weight:800; margin:0 0 16px;
    color:var(--ink); display:flex; align-items:center; gap:8px;
  }
  .card h2::before{
    content:""; width:7px; height:7px; border-radius:50%;
    background:linear-gradient(135deg, var(--red), var(--gold));
    display:inline-block;
  }

  /* 彩种切换 */
  .segmented{
    display:flex; background:var(--card-soft); border-radius:14px; padding:4px; gap:4px;
  }
  .segmented button{
    flex:1; border:none; background:transparent; padding:11px 0;
    font-family:'Noto Sans SC', sans-serif; font-weight:700; font-size:15.5px;
    color:var(--ink-soft); border-radius:11px; cursor:pointer; transition:.15s;
  }
  .segmented button.active{
    background:linear-gradient(135deg, var(--red), var(--red-dark));
    color:#fff; box-shadow:0 4px 10px rgba(214,84,60,0.30);
  }

  .range-row{ display:flex; flex-wrap:wrap; gap:9px; align-items:center; }
  .pill{
    font-family:'IBM Plex Mono', monospace; font-size:14px; font-weight:600;
    padding:9px 16px; border-radius:999px; border:none; cursor:pointer;
    background:var(--card-soft); color:var(--ink-soft);
  }
  .pill.active{
    background:linear-gradient(135deg, var(--gold), var(--gold-dark));
    color:#fff; box-shadow:0 4px 10px rgba(220,154,32,0.30);
  }
  .range-custom{
    display:flex; align-items:center; gap:6px;
    background:var(--card-soft); border-radius:999px; padding:5px 6px 5px 16px;
  }
  .range-custom span{ font-size:13.5px; color:var(--ink-soft); font-family:'IBM Plex Mono', monospace; }
  .range-custom input{
    width:58px; border:none; background:transparent; text-align:center;
    font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:15px; color:var(--ink);
    outline:none;
  }
  .range-custom button{
    border:none; border-radius:999px; padding:8px 15px;
    font-family:'Noto Sans SC', sans-serif; font-weight:700; font-size:13.5px;
    background:var(--ink); color:#fff; cursor:pointer;
  }
  .meta-line{
    margin-top:13px; font-family:'IBM Plex Mono', monospace; font-size:12.5px;
    color:var(--ink-soft); line-height:1.7;
  }

  /* 最新奖号 */
  .latest-issue{
    font-family:'IBM Plex Mono', monospace; font-size:13.5px; color:var(--ink-soft);
    margin-bottom:13px;
  }
  .balls-row{ display:flex; flex-wrap:wrap; gap:10px; }
  .ball{
    width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:15px;
    color:#fff; flex-shrink:0;
  }
  .ball.red{ background:linear-gradient(150deg, var(--red), var(--red-dark)); box-shadow:0 3px 8px rgba(214,84,60,0.35); }
  .ball.gold{ background:linear-gradient(150deg, var(--gold), var(--gold-dark)); box-shadow:0 3px 8px rgba(220,154,32,0.35); }
  .ball-sm{ width:29px; height:29px; font-size:12px; }

  /* 区间奖号列表 */
  .draw-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:12px 2px; border-bottom:1px solid var(--line);
  }
  .draw-row:last-child{ border-bottom:none; }
  .draw-row .meta{
    font-family:'IBM Plex Mono', monospace; font-size:12.5px; color:var(--ink-soft);
    white-space:nowrap; line-height:1.5;
  }
  .draw-row .balls{ display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
  .scroll-list{ max-height:320px; overflow-y:auto; margin:0 -2px; }

  /* 命中率排行 —— 数字是主角，不用概率进度条，用大号码+百分比小标签 */
  .zone-title{
    font-size:13px; font-weight:700; color:var(--ink-soft);
    text-transform:uppercase; letter-spacing:.06em; margin:0 0 12px;
  }
  .hitrate-grid{ display:flex; flex-wrap:wrap; gap:16px 14px; }
  .hitrate-chip{ display:flex; flex-direction:column; align-items:center; gap:7px; width:52px; }
  .hitrate-chip .rank{
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:var(--ink-soft); opacity:.75;
  }
  .hitrate-chip .ball{ width:46px; height:46px; font-size:17px; }
  .hitrate-chip .pct{
    font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:13px; color:var(--ink);
  }
  .zone-block{ margin-bottom:22px; }
  .zone-block:last-child{ margin-bottom:0; }

  .disclaimer{
    background:var(--card-soft);
    border-radius:16px;
    padding:16px 18px;
    font-size:13px; line-height:1.85; color:var(--ink-soft);
  }
  .disclaimer b{ color:var(--ink); }

  .footer-credit{
    text-align:center; font-size:12.5px; color:var(--ink-soft);
    padding:10px 0 0; opacity:.7;
  }
</style>
</head>
<body>

    <div class="scroll-list" id="drawsList"></div>
  </div>

  <div class="card">
    <h2>中标率最高号码（本区间）</h2>
    <div class="zone-block">
      <div class="zone-title" id="zoneLabelA"></div>
      <div class="hitrate-grid" id="hitrateA"></div>
    </div>
    <div class="zone-block">
      <div class="zone-title" id="zoneLabelB"></div>
      <div class="hitrate-grid" id="hitrateB"></div>
    </div>
  </div>

  <div class="disclaimer">
    <b>小提醒：</b> 双色球、大乐透每期开奖均为独立随机事件，历史出现频率（中标率）与下一期开出的号码之间
    没有统计学上的因果关系或预测力——某个号码在过去区间内出现得多，并不代表它下一期"更容易"或"更不容易"出现。
    本工具所展示的中标率排行，仅供了解某一区间的历史分布，不构成任何"必中"依据，请理性购彩、量力而行。
  </div>

  <div class="footer-credit">LuckyPaper · 数据仅供参考</div>
</div>

<script>
function seededRandom(seed){
  let s = seed;
  return function(){ s = (s * 9301 + 49297) % 233280; return s / 233280; };
}
function pickUnique(rand, count, min, max){
  const set = new Set();
  while(set.size < count) set.add(min + Math.floor(rand() * (max - min + 1)));
  return Array.from(set).sort((a,b)=>a-b);
}
function genDraws(game, total){
  const rand = seededRandom(game === 'ssq' ? 20260001 : 20261001);
  const draws = [];
  const baseDate = new Date('2026-07-20');
  for(let i=0;i<total;i++){
    const d = new Date(baseDate);
    d.setDate(d.getDate() - i * (game==='ssq'?2:3));
    const issue = 2026000 + (total - i);
    let front, back;
    if(game === 'ssq'){ front = pickUnique(rand, 6, 1, 33); back = pickUnique(rand, 1, 1, 16); }
    else { front = pickUnique(rand, 5, 1, 35); back = pickUnique(rand, 2, 1, 12); }
    draws.push({ issue:String(issue), date:d.toISOString().slice(0,10), front, back });
  }
  return draws;
}

const CONFIG = {
  ssq:{ frontMax:33, frontPick:6, backMax:16, backPick:1, zoneA:'红球', zoneB:'蓝球', name:'双色球' },
  dlt:{ frontMax:35, frontPick:5, backMax:12, backPick:2, zoneA:'前区', zoneB:'后区', name:'大乐透' }
};
let state = { game:'ssq', n:50 };
let DATA = { ssq: [], dlt: [] };
let DATA_SOURCE = { ssq:'示例数据', dlt:'示例数据' };

async function loadRealData(game){
  try{
    const res = await fetch(`data/${game}.json`, { cache: 'no-store' });
    if(!res.ok) throw new Error('no file');
    const payload = await res.json();
    if(!payload.draws || payload.draws.length < 5) throw new Error('empty');
    DATA_SOURCE[game] = `真实数据 · 更新于 ${payload.updatedAt ? payload.updatedAt.slice(0,16).replace('T',' ') : '未知时间'}`;
    return payload.draws;
  } catch(e){
    DATA_SOURCE[game] = '示例数据（尚未接入真实抓取数据，或本地直接打开文件无法读取data/目录）';
    return genDraws(game, 260);
  }
}
async function initData(){
  DATA.ssq = await loadRealData('ssq');
  DATA.dlt = await loadRealData('dlt');
  render();
}

function renderHitRate(elId, freq, maxNum, pickCount, totalDraws, colorClass){
  const el = document.getElementById(elId);
  const list = [];
  for(let n=1;n<=maxNum;n++) list.push({ n, c: freq[n] });
  list.sort((a,b) => b.c - a.c || a.n - b.n);
  const top = list.slice(0, pickCount);
  el.innerHTML = top.map((x, i) => {
    const pct = totalDraws ? (x.c / totalDraws * 100) : 0;
    return `<div class="hitrate-chip">
      <div class="rank">NO.${i+1}</div>
      <div class="ball ${colorClass}">${String(x.n).padStart(2,'0')}</div>
      <div class="pct">${pct.toFixed(1)}%</div>
    </div>`;
  }).join('');
}

function render(){
  const cfg = CONFIG[state.game];
  const all = DATA[state.game];
  const n = Math.min(state.n, all.length);
  const draws = all.slice(0, n);

  document.getElementById('metaLine').textContent =
    `${cfg.name} ｜ 最近 ${n} 期（第 ${draws[draws.length-1].issue} 期 ~ 第 ${draws[0].issue} 期）｜ 数据来源：${DATA_SOURCE[state.game]}`;
  document.getElementById('rangeLabel').textContent = `近 ${n} 期`;
  document.getElementById('zoneLabelA').textContent = `${cfg.zoneA}（1-${cfg.frontMax}）`;
  document.getElementById('zoneLabelB').textContent = `${cfg.zoneB}（1-${cfg.backMax}）`;

  const latest = draws[0];
  document.getElementById('latestIssue').textContent = `第 ${latest.issue} 期 · ${latest.date}`;
  document.getElementById('latestBalls').innerHTML =
    latest.front.map(x=>`<span class="ball red">${String(x).padStart(2,'0')}</span>`).join('') +
    latest.back.map(x=>`<span class="ball gold">${String(x).padStart(2,'0')}</span>`).join('');

  document.getElementById('drawsList').innerHTML = draws.map(d => `
    <div class="draw-row">
      <div class="meta">${d.issue}<br>${d.date}</div>
      <div class="balls">
        ${d.front.map(x=>`<span class="ball ball-sm red">${String(x).padStart(2,'0')}</span>`).join('')}
        ${d.back.map(x=>`<span class="ball ball-sm gold">${String(x).padStart(2,'0')}</span>`).join('')}
      </div>
    </div>`).join('');

  const freqFront = new Array(cfg.frontMax+1).fill(0);
  const freqBack = new Array(cfg.backMax+1).fill(0);
  draws.forEach(d => {
    d.front.forEach(x => freqFront[x]++);
    d.back.forEach(x => freqBack[x]++);
  });
  renderHitRate('hitrateA', freqFront, cfg.frontMax, cfg.frontPick, draws.length, 'red');
  renderHitRate('hitrateB', freqBack, cfg.backMax, cfg.backPick, draws.length, 'gold');
}

document.querySelectorAll('.segmented button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.segmented button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); state.game = btn.dataset.game; render();
  });
});
document.querySelectorAll('.pill[data-n]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill[data-n]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); state.n = parseInt(btn.dataset.n,10); render();
  });
});
document.getElementById('applyCustom').addEventListener('click', () => {
  const v = parseInt(document.getElementById('customN').value,10);
  if(v && v>=1 && v<=500){
    document.querySelectorAll('.pill[data-n]').forEach(b=>b.classList.remove('active'));
    state.n = v; render();
  }
});

initData();
</script>
</body>
</html>
